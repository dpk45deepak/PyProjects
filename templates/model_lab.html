<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Model Lab | {{ name }}</title>
    <link
        rel="icon"
        type="image/svg+xml"
        href="{{ url_for('static', path='/image.png') }}"
    />
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root { --bg-deep: #020617; --accent-cyan: #22d3ee; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: var(--bg-deep); color: #f1f5f9; }
        
        .glass-panel {
            background: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(56, 189, 248, 0.1);
        }

        .input-field {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: 0.3s;
        }

        .input-field:focus {
            border-color: var(--accent-cyan);
            background: rgba(34, 211, 238, 0.05);
            outline: none;
            box-shadow: 0 0 15px rgba(34, 211, 238, 0.1);
        }

        .btn-predict {
            background: linear-gradient(135deg, #3b82f6 0%, #22d3ee 100%);
            transition: all 0.3s ease;
        }

        .btn-predict:hover {
            transform: scale(1.02);
            box-shadow: 0 0 25px rgba(59, 130, 246, 0.4);
        }
    </style>
</head>
<body class="antialiased min-h-screen">

    <div class="max-w-6xl mx-auto px-6 py-12">
        <a href="/" class="text-slate-500 hover:text-cyan-400 text-sm flex items-center gap-2 mb-8 transition-colors">
            ← Back to Portfolio
        </a>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">
            
            <aside class="lg:col-span-3 space-y-4">
                <h2 class="text-xs font-bold uppercase tracking-widest text-slate-500 mb-6 px-4">Available Models</h2>
                <nav class="space-y-2">
                    <button class="w-full text-left px-4 py-3 rounded-xl glass-panel border-cyan-500/50 text-cyan-400 font-semibold">Linear Regression</button>
                    <button class="w-full text-left px-4 py-3 rounded-xl glass-panel text-slate-400 hover:text-white transition-all">Logistic Regression</button>
                    <button class="w-full text-left px-4 py-3 rounded-xl glass-panel text-slate-400 hover:text-white transition-all">SVM Classifier</button>
                    <button class="w-full text-left px-4 py-3 rounded-xl glass-panel text-slate-400 hover:text-white transition-all">KNN Clustering</button>
                </nav>
            </aside>

            <main class="lg:col-span-9">
                <div class="glass-panel rounded-[2.5rem] p-8 md:p-12">
                    
                    <div class="mb-10">
                        <div class="flex items-center gap-4 mb-4">
                            <span class="px-3 py-1 bg-cyan-500/10 text-cyan-400 text-[10px] font-bold uppercase tracking-widest rounded-lg border border-cyan-500/20">Regression</span>
                            <span class="text-slate-500 text-sm">Accuracy: 94.2%</span>
                        </div>
                        <h1 class="text-4xl font-bold text-white mb-4">House Price Prediction</h1>
                        <p class="text-slate-400 leading-relaxed max-w-2xl">
                            Input the features below to get a real-time price estimation generated by the Linear Regression model trained on the Boston Housing Dataset.
                        </p>
                    </div>

                    <form action="/predict" method="post" class="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <div class="space-y-2">
                            <label class="text-sm font-medium text-slate-300">Square Footage (sqft)</label>
                            <input type="number" name="sqft" placeholder="e.g. 1200" class="w-full px-4 py-3 rounded-xl input-field text-white">
                        </div>
                        <div class="space-y-2">
                            <label class="text-sm font-medium text-slate-300">Number of Bedrooms</label>
                            <input type="number" name="beds" placeholder="e.g. 3" class="w-full px-4 py-3 rounded-xl input-field text-white">
                        </div>
                        <div class="space-y-2">
                            <label class="text-sm font-medium text-slate-300">Year Built</label>
                            <input type="number" name="year" placeholder="e.g. 1995" class="w-full px-4 py-3 rounded-xl input-field text-white">
                        </div>
                        <div class="space-y-2">
                            <label class="text-sm font-medium text-slate-300">Neighborhood Quality (1-10)</label>
                            <input type="range" min="1" max="10" name="quality" class="w-full h-2 bg-slate-800 rounded-lg appearance-none cursor-pointer accent-cyan-400 mt-4">
                        </div>

                        <div class="md:col-span-2 pt-6">
                            <button type="submit" class="w-full py-4 rounded-2xl btn-predict text-white font-bold text-lg shadow-lg">
                                Run Inference
                            </button>
                        </div>
                    </form>

                    {% if prediction %}
                    <div class="mt-12 p-8 rounded-3xl bg-cyan-500/5 border border-cyan-500/20 animate-in fade-in slide-in-from-bottom-4 duration-700">
                        <h3 class="text-cyan-400 text-xs font-bold uppercase tracking-widest mb-2">Model Output</h3>
                        <div class="text-5xl font-bold text-white tracking-tight">
                            ${{ prediction }}
                        </div>
                    </div>
                    {% endif %}

                </div>
            </main>
        </div>
    </div>

</body>
</html>
